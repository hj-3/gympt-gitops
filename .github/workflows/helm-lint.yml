name: Helm Lint and Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/helm-lint.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - backend-api
          - agent-service
          - posture-analysis-service
          - report-service
          - remediation-worker
          - generic-worker
          - kvs-consumer-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Helm Lint
        run: |
          helm lint charts/${{ matrix.chart }}

      - name: Helm Template values files
        run: |
          shopt -s nullglob
          values_files=(charts/${{ matrix.chart }}/values*.yaml)
          if [ ${#values_files[@]} -eq 0 ]; then
            echo "::error::No values files found for ${{ matrix.chart }}"
            exit 1
          fi

          for values_file in "${values_files[@]}"; do
            echo "Rendering ${{ matrix.chart }} with ${values_file}"
            helm template ${{ matrix.chart }} charts/${{ matrix.chart }} \
              -f "${values_file}" \
              --debug
          done

      - name: Check for required templates
        run: |
          REQUIRED_TEMPLATES=(
            "deployment.yaml"
            "service.yaml"
            "serviceaccount.yaml"
          )
          for template in "${REQUIRED_TEMPLATES[@]}"; do
            if [ ! -f "charts/${{ matrix.chart }}/templates/$template" ]; then
              echo "::error::Missing required template: $template"
              exit 1
            fi
          done

      - name: Validate values files
        run: |
          shopt -s nullglob
          values_files=(charts/${{ matrix.chart }}/values*.yaml)
          if [ ${#values_files[@]} -eq 0 ]; then
            echo "::error::No values files found"
            exit 1
          fi

  test:
    name: Helm Test with Chart Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --check-version-increment=false --validate-yaml=false

  comment:
    name: Comment PR
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lintStatus = '${{ needs.lint.result }}';
            const testStatus = '${{ needs.test.result }}';

            const statusIcon = (status) => {
              return status === 'success' ? 'PASS' : status === 'failure' ? 'FAIL' : 'SKIP';
            };

            const output = `## Helm Lint Results

            - Helm Lint: ${statusIcon(lintStatus)} \`${lintStatus}\`
            - Chart Testing: ${statusIcon(testStatus)} \`${testStatus}\`

            ${lintStatus === 'success' && testStatus === 'success' ? '**All checks passed!**' : '**Some checks failed.** Please review the logs.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
