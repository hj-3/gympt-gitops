name: Kubeconform Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - 'argocd/**'
      - '.github/workflows/kubeconform.yml'

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - backend-api
          - agent-service
          - posture-analysis-service
          - report-service
          - remediation-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin

      - name: Download CRD schemas
        run: |
          mkdir -p schemas
          wget -O schemas/ExternalSecret.json \
            https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
          wget -O schemas/ServiceMonitor.json \
            https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/servicemonitor_v1.json

      - name: Render Helm templates
        run: |
          shopt -s nullglob
          values_files=(charts/${{ matrix.chart }}/values*.yaml)
          if [ ${#values_files[@]} -eq 0 ]; then
            echo "::error::No values files found for ${{ matrix.chart }}"
            exit 1
          fi

          for values_file in "${values_files[@]}"; do
            values_name="$(basename "${values_file}" .yaml)"
            output_dir="rendered/${{ matrix.chart }}/${values_name}"
            mkdir -p "${output_dir}"
            echo "Rendering ${{ matrix.chart }} with ${values_file}"
            helm template ${{ matrix.chart }} charts/${{ matrix.chart }} \
              -f "${values_file}" \
              --output-dir "${output_dir}"
          done

      - name: Validate rendered manifests
        run: |
          kubeconform -summary -output json \
            -kubernetes-version 1.35.0 \
            -strict \
            -schema-location default \
            -schema-location 'schemas/{{ .ResourceKind }}.json' \
            rendered/${{ matrix.chart }}

  validate-argocd:
    name: Validate Argo CD Applications
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin

      - name: Download Argo CD schemas
        run: |
          mkdir -p schemas
          wget -O schemas/Application.json \
            https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
          wget -O schemas/AppProject.json \
            https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/appproject_v1alpha1.json

      - name: Validate Argo CD Applications
        run: |
          kubeconform -summary \
            -kubernetes-version 1.35.0 \
            -schema-location default \
            -schema-location 'schemas/{{ .ResourceKind }}.json' \
            argocd/applications/**/*.yaml \
            argocd/app-of-apps/*.yaml \
            argocd/projects/*.yaml
