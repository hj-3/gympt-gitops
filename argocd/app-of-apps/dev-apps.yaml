apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gympt-dev-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gympt-apps

  source:
    repoURL: https://github.com/gympt/gympt-gitops.git
    targetRevision: main
    path: argocd/applications/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
