apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gympt-prod-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gympt-apps

  source:
    repoURL: https://github.com/gympt/gympt-gitops.git
    targetRevision: main
    path: argocd/applications/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false  # Safer for production
      selfHeal: false  # Manual sync in production
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
