apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: gympt-platform
  source:
    repoURL: https://charts.karpenter.sh
    chart: karpenter
    targetRevision: v0.33.0
    helm:
      parameters:
        - name: settings.clusterName
          value: gympt-dev-eks
        - name: serviceAccount.annotations.eks\.amazonaws\.com/role-arn
          value: arn:aws:iam::123456789012:role/karpenter-controller-role
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
