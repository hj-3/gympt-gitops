apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gympt-platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 56.0.0
    helm:
      values: |
        alertmanager:
          enabled: true
          alertmanagerSpec:
            secrets:
              - alertmanager-slack-webhook
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace', 'severity']
              group_wait: 10s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'default'
              routes:
                - match:
                    alertname: Watchdog
                  receiver: 'null'
                - match:
                    severity: critical
                  receiver: 'critical'
                - match:
                    severity: warning
                  receiver: 'warning'
            receivers:
              - name: 'null'
              - name: 'default'
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts'
                    send_resolved: true
                    title: 'GYMPT monitoring alert'
                    text: 'An alert was received from Alertmanager. Check Grafana and Alertmanager for details.'
              - name: 'warning'
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts-warning'
                    send_resolved: true
                    title: 'GYMPT warning alert'
                    text: 'A warning alert was received from Alertmanager. Check Grafana and Alertmanager for details.'
              - name: 'critical'
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts-critical'
                    send_resolved: true
                    title: 'GYMPT critical alert'
                    text: 'A critical alert was received from Alertmanager. Check Grafana and Alertmanager for details.'
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
            retention: 30d
        grafana:
          adminPassword: changeme
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboardsConfigMaps:
            default: grafana-dashboards
          ingress:
            enabled: true
            ingressClassName: alb
            hosts:
              - grafana.dev.g2mpt.com
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
