apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gympt-platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 56.0.0
    helm:
      values: |
        alertmanager:
          enabled: true
          alertmanagerSpec:
            secrets:
              - alertmanager-slack-webhook
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace', 'severity']
              group_wait: 10s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'default'
              routes:
                - match:
                    alertname: Watchdog
                  receiver: 'null'
                - match:
                    severity: critical
                  receiver: 'critical'
                - match:
                    severity: warning
                  receiver: 'warning'
            receivers:
              - name: 'null'
              - name: 'default'
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts'
                    send_resolved: true
                    title: 'GYMPT monitoring alert'
                    text: 'An alert was received from Alertmanager. Check Grafana and Alertmanager for details.'
              - name: 'warning'
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts-warning'
                    send_resolved: true
                    title: 'GYMPT warning alert'
                    text: 'A warning alert was received from Alertmanager. Check Grafana and Alertmanager for details.'
              - name: 'critical'
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts-critical'
                    send_resolved: true
                    title: 'GYMPT critical alert'
                    text: 'A critical alert was received from Alertmanager. Check Grafana and Alertmanager for details.'
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
            retention: 30d
        grafana:
          adminPassword: changeme
          plugins:
            - grafana-athena-datasource 2.13.0
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::337112169365:role/gympt-prod-grafana-athena
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
                  access: proxy
                  isDefault: true
                - name: CloudWatch
                  type: cloudwatch
                  jsonData:
                    authType: default
                    defaultRegion: ap-northeast-2
                - name: Athena
                  type: grafana-athena-datasource
                  jsonData:
                    authType: default
                    defaultRegion: ap-northeast-2
                    catalog: AwsDataCatalog
                    database: gympt_prod_catalog
                    workgroup: gympt-prod-workgroup
                    outputLocation: s3://gympt-prod-athena-results-337112169365/athena-results/
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboardsConfigMaps:
            default: grafana-dashboards
          ingress:
            enabled: true
            ingressClassName: alb
            annotations:
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/healthcheck-path: /api/health
            hosts:
              - grafana.g2mpt.com
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
