apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gympt-platform
  namespace: argocd
spec:
  description: Platform infrastructure components (Karpenter, metrics, monitoring)

  sourceRepos:
    - '*'

  destinations:
    - namespace: 'karpenter'
      server: https://kubernetes.default.svc
    - namespace: 'external-secrets'
      server: https://kubernetes.default.svc
    - namespace: 'monitoring'
      server: https://kubernetes.default.svc
    - namespace: 'kube-system'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
