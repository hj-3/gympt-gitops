apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gympt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: GYMPT AI Agent Project

  # Source repositories
  sourceRepos:
    - 'https://github.com/hj-3/gympt-gitops.git'
    - 'https://charts.bitnami.com/bitnami'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://grafana.github.io/helm-charts'

  # Destination clusters and namespaces
  destinations:
    - namespace: 'gympt-*'
      server: 'https://kubernetes.default.svc'
    - namespace: 'monitoring'
      server: 'https://kubernetes.default.svc'
    - namespace: 'ingress-nginx'
      server: 'https://kubernetes.default.svc'
    - namespace: 'cert-manager'
      server: 'https://kubernetes.default.svc'
    - namespace: 'external-secrets'
      server: 'https://kubernetes.default.svc'

  # Cluster resource allow list
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
    - group: 'apiextensions.k8s.io'
      kind: CustomResourceDefinition
    - group: 'cert-manager.io'
      kind: ClusterIssuer
    - group: 'external-secrets.io'
      kind: ClusterSecretStore

  # Namespace resource allow list
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Deny list
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange

  # Roles
  roles:
    - name: read-only
      description: Read-only access to all applications
      policies:
        - p, proj:gympt:read-only, applications, get, gympt/*, allow
        - p, proj:gympt:read-only, applications, list, gympt/*, allow
      groups:
        - gympt-viewers

    - name: developer
      description: Developer access with sync permissions
      policies:
        - p, proj:gympt:developer, applications, get, gympt/*, allow
        - p, proj:gympt:developer, applications, sync, gympt/dev-*, allow
        - p, proj:gympt:developer, applications, override, gympt/dev-*, allow
      groups:
        - gympt-developers

    - name: admin
      description: Full access to all applications
      policies:
        - p, proj:gympt:admin, applications, *, gympt/*, allow
      groups:
        - gympt-admins
