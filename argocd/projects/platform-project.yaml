apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gympt-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: GymPT platform infrastructure services

  sourceRepos:
    - 'https://github.com/gympt/gympt-gitops.git'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://charts.external-secrets.io'
    - 'https://aws.github.io/eks-charts'
    - 'https://karpenter.sh'
    - 'https://kubernetes.github.io/ingress-nginx'

  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  roles:
    - name: platform-admin
      description: Platform admin role
      policies:
        - p, proj:gympt-platform:platform-admin, applications, *, gympt-platform/*, allow
      groups:
        - gympt-platform-admins
