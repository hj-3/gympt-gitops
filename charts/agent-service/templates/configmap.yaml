apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "generic-worker.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "generic-worker.labels" . | nindent 4 }}
data:
  worker.conf: |
    # Generic Worker Configuration
    # This config is mounted to the container for additional settings

    [worker]
    concurrency = {{ .Values.workerConcurrency | default "4" }}
    max_tasks_per_child = {{ .Values.workerMaxTasksPerChild | default "1000" }}

    [logging]
    level = {{ .Values.logLevel | default "INFO" }}
    format = {{ .Values.logFormat | default "json" }}

    [metrics]
    enabled = true
    port = {{ .Values.metricsPort | default "8000" }}
