# Development environment overrides
replicaCount: 1

image:
  tag: "dev-latest"

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-dev-agent-service-pod-role"

# Lower resources for dev
resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Disable autoscaling in dev
autoscaling:
  enabled: false

# Dev environment variables
env:
  - name: LOG_LEVEL
    value: "DEBUG"
  - name: LOG_FORMAT
    value: "json"
  - name: WORKER_CONCURRENCY
    value: "2"
  - name: WORKER_MAX_TASKS_PER_CHILD
    value: "100"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: ENVIRONMENT
    value: "dev"
  - name: SQS_QUEUE_URL
    value: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-dev-report-generation"
  - name: SQS_MAX_MESSAGES
    value: "5"
  - name: SQS_WAIT_TIME_SECONDS
    value: "20"
  - name: METRICS_PORT
    value: "8000"

# Pod labels
podLabels:
  environment: dev
  app.kubernetes.io/component: worker
  app.kubernetes.io/part-of: gympt

# Disable PDB in dev
podDisruptionBudget:
  enabled: false
