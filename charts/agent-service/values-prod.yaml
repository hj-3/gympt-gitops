# Production environment overrides
replicaCount: 1
image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/agent-service
  tag: "42-070f8f7"
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-prod-agent-service-pod-role"
externalSecrets:
  enabled: true
  name: agent-service-secrets
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  dataFrom:
    - key: gympt/prod/agent-service
# Higher resources for production
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi
# Aggressive autoscaling in production
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
# Production environment variables
env:
  - name: APP_ENV
    value: "prod"
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_FORMAT
    value: "json"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: ENVIRONMENT
    value: "production"
  - name: ENABLE_BEDROCK_MOCK
    # Bedrock Configuration

    value: "false"
  - name: BEDROCK_REGION
    value: "us-west-2"
  - name: BEDROCK_MODEL_ID
    value: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  - name: BEDROCK_AGENT_ID
    value: "WPQ0RESSZS"
  - name: BEDROCK_AGENT_ALIAS_ID
    value: "E5LE29XZS1"
  - name: REDIS_HOST
    # Redis Configuration

    value: "master.gympt-prod-redis.8yu9pt.apn2.cache.amazonaws.com"
  - name: REDIS_PORT
    value: "6379"
  - name: DYNAMODB_AGENT_INTERACTIONS_TABLE
    # DynamoDB Configuration

    value: "gympt-prod-agent-interactions"
  - name: BACKEND_API_BASE_URL
    # Backend API

    value: "http://backend-api-prod.gympt-prod.svc.cluster.local:8080"
  - name: SQS_POSTURE_EVENT_QUEUE_URL
    value: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-posture-event-queue"
  - name: SQS_REPORT_GENERATION_QUEUE_URL
    value: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-report-generation-queue"
  - name: AWS_ACCOUNT_ID
    value: "337112169365"
# Pod labels
podLabels:
  environment: production
  app.kubernetes.io/component: worker
  app.kubernetes.io/part-of: gympt
# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1
# Longer termination grace period for graceful shutdown
terminationGracePeriodSeconds: 60
# Node affinity for production workloads
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - agent-service
          topologyKey: kubernetes.io/hostname
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - t3.medium
                - t3.large
