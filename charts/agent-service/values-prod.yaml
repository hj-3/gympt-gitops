# Production environment overrides
replicaCount: 3

image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/agent-service
  tag: "13-1c4bb75"

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-prod-agent-service-pod-role"

# Higher resources for production
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Aggressive autoscaling in production
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Production environment variables
env:
  - name: APP_ENV
    value: "prod"
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_FORMAT
    value: "json"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: ENVIRONMENT
    value: "production"
  # Bedrock Configuration
  - name: ENABLE_BEDROCK_MOCK
    value: "false"
  - name: BEDROCK_REGION
    value: "us-west-2"
  - name: BEDROCK_MODEL_ID
    value: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  - name: BEDROCK_AGENT_ID
    value: "WPQ0RESSZS"
  - name: BEDROCK_AGENT_ALIAS_ID
    value: "E5LE29XZS1"
  # Redis Configuration
  - name: REDIS_HOST
    value: "master.gympt-prod-redis.8yu9pt.apn2.cache.amazonaws.com"
  - name: REDIS_PORT
    value: "6379"
  # DynamoDB Configuration
  - name: DYNAMODB_AGENT_INTERACTIONS_TABLE
    value: "gympt-prod-agent-interactions"
  # Backend API
  - name: BACKEND_API_BASE_URL
    value: "http://backend-api-prod.gympt-prod.svc.cluster.local:8080"
  # SQS Configuration
  - name: SQS_AGENT_TASK_QUEUE_URL
    value: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-agent-task-queue"

# Pod labels
podLabels:
  environment: production
  app.kubernetes.io/component: worker
  app.kubernetes.io/part-of: gympt

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Longer termination grace period for graceful shutdown
terminationGracePeriodSeconds: 60

# Node affinity for production workloads
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - agent-service
          topologyKey: kubernetes.io/hostname
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - t3.medium
                - t3.large
