# Default values for agent-service
replicaCount: 2

image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/agent-service
  pullPolicy: IfNotPresent
  tag: "57c3aed"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  annotations:
    # IRSA role for AWS access (S3, SQS, DynamoDB, SES)
    eks.amazonaws.com/role-arn: ""
  name: ""

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

# Pod labels
podLabels:
  app.kubernetes.io/component: worker
  app.kubernetes.io/part-of: gympt

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service configuration (for metrics endpoint)
service:
  type: ClusterIP
  port: 8000
  targetPort: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Environment variables
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_FORMAT
    value: "json"
  - name: WORKER_CONCURRENCY
    value: "4"
  - name: WORKER_MAX_TASKS_PER_CHILD
    value: "1000"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: SQS_QUEUE_URL
    value: ""
  - name: SQS_MAX_MESSAGES
    value: "10"
  - name: SQS_WAIT_TIME_SECONDS
    value: "20"
  - name: METRICS_PORT
    value: "8000"

# Environment variables from secrets
envFrom:
  - secretRef:
      name: agent-service-secrets
      optional: true

externalSecrets:
  enabled: false
  name: agent-service-secrets
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data: []
  dataFrom: []

# Liveness probe
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Volume mounts
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /app/.cache

# Volumes
volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - agent-service
          topologyKey: kubernetes.io/hostname

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class
priorityClassName: ""

# Termination grace period
terminationGracePeriodSeconds: 30
