# Production environment values for backend-api
replicaCount: 1
image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/backend-api
  tag: "112-9685880"
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::337112169365:role/gympt-prod-backend-api-pod-role
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:337112169365:certificate/f69f74d7-6b56-43ad-b686-cb06d893a99d
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=120,access_logs.s3.enabled=true,access_logs.s3.bucket=gympt-prod-logs-337112169365,access_logs.s3.prefix=alb-access-logs
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-northeast-2:337112169365:regional/webacl/gympt-alb-waf/4816c0be-8543-46f9-95bb-351b6f2a1d38
  hosts:
    - host: api.g2mpt.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-api-tls
      hosts:
        - api.g2mpt.com
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
env:
  - name: ENV
    value: "prod"
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: LOG_LEVEL
    value: "INFO"
configMap:
  data:
    LOG_LEVEL: "INFO"
    CORS_ORIGINS: "https://g2mpt.com,https://www.g2mpt.com,https://d97iz6muc3af.cloudfront.net"
    AGENT_SERVICE_BASE_URL: "http://agent-service-prod.gympt-prod.svc.cluster.local:8001"
    POSTURE_ANALYSIS_SERVICE_URL: "http://posture-analysis-service-prod.gympt-prod.svc.cluster.local:8002"
    REPORT_SERVICE_URL: "http://report-service-prod.gympt-prod.svc.cluster.local:8003"
    NOTIFICATION_SERVICE_URL: "http://notification-service:8004"
    # Database configuration

    DB_HOST: "gympt-prod-postgres.cpuskg4g6hoy.ap-northeast-2.rds.amazonaws.com"
    DB_PORT: "5432"
    DB_NAME: "gympt"
    DB_USERNAME: "gymptadmin"
    # Redis configuration

    REDIS_HOST: "master.gympt-prod-redis.8yu9pt.apn2.cache.amazonaws.com"
    REDIS_PORT: "6379"
    # AWS configuration

    AWS_ACCOUNT_ID: "337112169365"
    # S3 buckets

    S3_MEDIA_BUCKET: "gympt-prod-media"
    S3_REPORT_BUCKET: "gympt-prod-reports"
    # DynamoDB tables

    DYNAMODB_WORKOUT_SESSIONS_TABLE: "gympt-prod-workout-sessions"
    DYNAMODB_POSTURE_EVENTS_TABLE: "gympt-prod-posture-events"
    DYNAMODB_WEARABLE_EVENTS_TABLE: "gympt-prod-wearable-events"
    DYNAMODB_AGENT_INTERACTIONS_TABLE: "gympt-prod-agent-interactions"
    # SQS queues

    SQS_POSTURE_EVENT_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-posture-event-queue"
    SQS_REPORT_GENERATION_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-report-generation-queue"
    SQS_RECOMMENDATION_UPDATE_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-recommendation-update-queue"
    # EventBridge

    EVENTBRIDGE_BUS_NAME: "gympt-prod-event-bus"
    # Cognito configuration

    COGNITO_ISSUER_URI: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_RuK8MTAAh"
externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: gympt/prod/database
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: gympt/prod/redis
        property: auth_token
    - secretKey: JWT_SECRET
      remoteRef:
        key: gympt/prod/jwt
        property: secret
serviceMonitor:
  enabled: true
  interval: 30s
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443 # HTTPS (AWS services: Cognito, Bedrock, S3, SQS, DynamoDB)
        - protocol: TCP
          port: 5432 # PostgreSQL
        - protocol: TCP
          port: 6379 # Redis
        - protocol: TCP
          port: 8001 # agent-service
        - protocol: TCP
          port: 8002 # posture-analysis-service
        - protocol: TCP
          port: 8003 # report-service
        - protocol: TCP
          port: 8004 # notification-service
podDisruptionBudget:
  enabled: true
  minAvailable: 1
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - backend-api
          topologyKey: topology.kubernetes.io/zone
