# Production environment values for backend-api

replicaCount: 2

image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/backend-api
  tag: "4761a51d2"  # Redis SSL enabled for ElastiCache TLS

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::337112169365:role/gympt-prod-backend-api-pod-role

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:337112169365:certificate/f69f74d7-6b56-43ad-b686-cb06d893a99d
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
  hosts:
    - host: api.g2mpt.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-api-tls
      hosts:
        - api.g2mpt.com

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

env:
  - name: ENV
    value: "prod"
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: LOG_LEVEL
    value: "INFO"

configMap:
  data:
    LOG_LEVEL: "INFO"
    CORS_ORIGINS: "https://g2mpt.com,https://www.g2mpt.com"
    AGENT_SERVICE_URL: "http://agent-service:8001"
    POSTURE_ANALYSIS_SERVICE_URL: "http://posture-analysis-service:8002"
    REPORT_SERVICE_URL: "http://report-service:8003"
    NOTIFICATION_SERVICE_URL: "http://notification-service:8004"
    # Database configuration
    DB_HOST: "gympt-prod-postgres.cpuskg4g6hoy.ap-northeast-2.rds.amazonaws.com"
    DB_PORT: "5432"
    DB_NAME: "gympt"
    DB_USERNAME: "gymptadmin"
    # Redis configuration
    REDIS_HOST: "master.gympt-prod-redis.8yu9pt.apn2.cache.amazonaws.com"
    REDIS_PORT: "6379"
    # AWS configuration
    AWS_ACCOUNT_ID: "337112169365"
    # S3 buckets
    S3_MEDIA_BUCKET: "gympt-prod-media"
    S3_REPORT_BUCKET: "gympt-prod-reports"
    # DynamoDB tables
    DYNAMODB_WORKOUT_SESSIONS_TABLE: "gympt-prod-workout-sessions"
    DYNAMODB_POSTURE_EVENTS_TABLE: "gympt-prod-posture-events"
    DYNAMODB_WEARABLE_EVENTS_TABLE: "gympt-prod-wearable-events"
    DYNAMODB_AGENT_INTERACTIONS_TABLE: "gympt-prod-agent-interactions"
    # SQS queues
    SQS_POSTURE_EVENT_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-posture-events"
    SQS_REPORT_GENERATION_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-report-generation"
    # EventBridge
    EVENTBRIDGE_BUS_NAME: "gympt-prod-event-bus"

externalSecrets:
  enabled: false  # Disabled - ClusterSecretStore not configured yet
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: gympt/prod/database
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: gympt/prod/redis
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: gympt/prod/jwt
        property: secret
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: gympt/prod/aws
        property: accessKeyId
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: gympt/prod/aws
        property: secretAccessKey

serviceMonitor:
  enabled: true
  interval: 30s

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-service
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 443   # HTTPS

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - backend-api
          topologyKey: topology.kubernetes.io/zone
