# Production environment values for backend-api

replicaCount: 3

image:
  repository: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/gympt/backend-api
  tag: "v1.0.0"  # Always use specific version tags in production

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/gympt-prod-backend-api-role

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:123456789012:certificate/prod-cert
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-northeast-2:123456789012:regional/webacl/gympt-prod/a1b2c3d4
  hosts:
    - host: api.gympt.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-api-tls
      hosts:
        - api.gympt.com

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

env:
  - name: ENV
    value: "prod"
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: LOG_LEVEL
    value: "INFO"

configMap:
  data:
    LOG_LEVEL: "INFO"
    CORS_ORIGINS: "https://gympt.com,https://www.gympt.com"
    AGENT_SERVICE_URL: "http://agent-service:8001"
    POSTURE_ANALYSIS_SERVICE_URL: "http://posture-analysis-service:8002"
    REPORT_SERVICE_URL: "http://report-service:8003"

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: gympt/prod/database
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: gympt/prod/redis
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: gympt/prod/jwt
        property: secret
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: gympt/prod/aws
        property: accessKeyId
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: gympt/prod/aws
        property: secretAccessKey

serviceMonitor:
  enabled: true
  interval: 30s

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-service
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 443   # HTTPS

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - backend-api
        topologyKey: topology.kubernetes.io/zone
