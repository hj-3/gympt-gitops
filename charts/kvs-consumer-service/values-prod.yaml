# Production values for kvs-consumer-service

replicaCount: 2

image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/kvs-consumer-service
  tag: "6-d0b1b5e"
  pullPolicy: Always

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-prod-kvs-consumer-pod-role"
  name: ""

service:
  type: ClusterIP
  port: 8003
  targetPort: 8003

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 2Gi

env:
  - name: ENV
    value: "prod"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: KVS_CHANNEL_PREFIX
    value: "prod-gympt"
  - name: POSTURE_ANALYSIS_URL
    value: "http://posture-analysis-service:8002/api/v1"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

networkPolicy:
  enabled: false
