# Default values for kvs-consumer-service

replicaCount: 1

image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-dev/kvs-consumer-service
  tag: "dev-latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8003
  targetPort: 8003

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

env:
  - name: ENV
    value: "dev"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: KVS_CHANNEL_PREFIX
    value: "dev-gympt"
  - name: POSTURE_ANALYSIS_URL
    value: "http://posture-analysis-service:8002/api/v1"
  - name: LOG_LEVEL
    value: "DEBUG"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

networkPolicy:
  enabled: false
