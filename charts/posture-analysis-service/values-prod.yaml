# Production values for posture-analysis-service with GPU support
replicaCount: 1
image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/posture-analysis-service
  tag: "42-070f8f7"
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-prod-posture-analysis-service-pod-role"
  name: ""
service:
  type: ClusterIP
  port: 8002
  targetPort: 8002
resources:
  limits:
    cpu: 4000m
    memory: 8Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 2000m
    memory: 4Gi
    nvidia.com/gpu: 1
# GPU node selector
nodeSelector:
  gpu: "true"
# GPU node tolerations
tolerations:
  - key: nvidia.com/gpu
    operator: Equal
    value: "true"
    effect: NoSchedule
affinity:
  # Require GPU nodes
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: gpu
              operator: In
              values:
                - "true"
  # Prefer spreading across zones

  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - posture-analysis-service
          topologyKey: topology.kubernetes.io/zone
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:337112169365:certificate/f69f74d7-6b56-43ad-b686-cb06d893a99d
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/group.name: gympt-prod
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
  hosts:
    - host: posture.g2mpt.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: posture-analysis-tls
      hosts:
        - posture.g2mpt.com
env:
  - name: ENV
    value: "prod"
  - name: ENABLE_GPU
    value: "true"
  - name: MODEL_TYPE
    value: "mediapipe"
  - name: ENABLE_KVS_MOCK
    value: "false"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: GPU_MEMORY_FRACTION
    value: "0.8"
  - name: CORS_ORIGINS
    value: "https://g2mpt.com,https://www.g2mpt.com,https://d97iz6muc3af.cloudfront.net"
autoscaling:
  enabled: false # GPU nodes typically don't autoscale
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
networkPolicy:
  enabled: false
externalSecrets:
  enabled: false
