# Production environment overrides
replicaCount: 3

image:
  tag: "57c3aed"  # Set by CI/CD pipeline
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/remediation-worker

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-prod-remediation-worker-pod-role"

# Higher resources for production
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Aggressive autoscaling in production
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Production environment variables
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_FORMAT
    value: "json"
  - name: WORKER_CONCURRENCY
    value: "8"
  - name: WORKER_MAX_TASKS_PER_CHILD
    value: "1000"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: ENVIRONMENT
    value: "production"
  - name: SQS_QUEUE_URL
    value: "https://sqs.ap-northeast-2.amazonaws.com/337112169365/gympt-prod-report-generation"
  - name: SQS_MAX_MESSAGES
    value: "10"
  - name: SQS_WAIT_TIME_SECONDS
    value: "20"
  - name: METRICS_PORT
    value: "8000"

# Pod labels
podLabels:
  environment: production
  app.kubernetes.io/component: worker
  app.kubernetes.io/part-of: gympt

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Longer termination grace period for graceful shutdown
terminationGracePeriodSeconds: 60

# Node affinity for production workloads
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - generic-worker
          topologyKey: kubernetes.io/hostname
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - t3.medium
                - t3.large
