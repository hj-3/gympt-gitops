# Development values for report-service

replicaCount: 1

image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-dev/report-service
  tag: "dev-latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-dev-report-service-pod-role"
  name: ""

service:
  type: ClusterIP
  port: 8003
  targetPort: 8003

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

env:
  - name: ENV
    value: "dev"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: S3_BUCKET
    value: "gympt-dev-reports"
  - name: LOG_LEVEL
    value: "DEBUG"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

networkPolicy:
  enabled: false
