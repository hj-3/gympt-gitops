# Production values for report-service
replicaCount: 1
image:
  repository: 337112169365.dkr.ecr.ap-northeast-2.amazonaws.com/gympt-prod/report-service
  tag: "20-070f8f7"
  pullPolicy: Always
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::337112169365:role/gympt-prod-report-service-pod-role"
  name: ""
service:
  type: ClusterIP
  port: 8003
  targetPort: 8003
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi
env:
  - name: ENV
    value: "prod"
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: S3_BUCKET
    value: "gympt-prod-reports"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
networkPolicy:
  enabled: false
