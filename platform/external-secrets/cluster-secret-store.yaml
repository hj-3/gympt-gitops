---
# ClusterSecretStore for AWS Secrets Manager
# This resource is cluster-wide and references AWS Secrets Manager
# Uses IRSA (IAM Roles for Service Accounts) for authentication
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system

---
# ClusterSecretStore for AWS Systems Manager Parameter Store
# Use this for non-sensitive configuration values
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system

---
# Note: ServiceAccount is created by Helm chart with values.yaml configuration
# This file only contains ClusterSecretStore and SecretStore resources

---
