---
# ExternalSecret for Agent Service
# Syncs secrets from AWS Secrets Manager to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-service-secrets
  namespace: agent-service
  labels:
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/component: agent
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: agent-service-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Backend API authentication
        BACKEND_API_URL: "http://backend-api.backend-api.svc.cluster.local:8080"
        BACKEND_API_KEY: "{{ .backend_api_key }}"

        # Redis for session management
        REDIS_URL: "redis://:{{ .redis_password }}@{{ .redis_host }}:{{ .redis_port }}/1"
        REDIS_PASSWORD: "{{ .redis_password }}"

        # AWS Bedrock API credentials
        AWS_ACCESS_KEY_ID: "{{ .aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .aws_secret_access_key }}"

        # Bedrock model configuration
        BEDROCK_MODEL_ID: "{{ .bedrock_model_id }}"
        BEDROCK_REGION: "us-east-1"

        # DynamoDB for agent interactions
        DYNAMODB_INTERACTIONS_TABLE: "{{ .dynamodb_interactions_table }}"

  dataFrom:
    - extract:
        key: gympt/dev/agent-service
