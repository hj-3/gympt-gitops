---
# ExternalSecret for Alertmanager Slack webhook
# Syncs the existing Slack webhook from AWS Secrets Manager to the Secret
# mounted by kube-prometheus-stack Alertmanager.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: alertmanager-slack-webhook
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        url: "{{ .slack_webhook_url }}"

  dataFrom:
    - extract:
        key: gympt/prod/remediation-worker
