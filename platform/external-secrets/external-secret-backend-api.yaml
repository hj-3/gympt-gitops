---
# ExternalSecret for Backend API
# Syncs secrets from AWS Secrets Manager to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-api-secrets
  namespace: backend-api
  labels:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/component: api
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: backend-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        # PostgreSQL Database URL
        DATABASE_URL: "postgresql://{{ .db_username }}:{{ .db_password }}@{{ .db_host }}:{{ .db_port }}/{{ .db_name }}"

        # Redis connection
        REDIS_URL: "redis://:{{ .redis_password }}@{{ .redis_host }}:{{ .redis_port }}/0"
        REDIS_PASSWORD: "{{ .redis_password }}"

        # JWT secret for authentication
        JWT_SECRET: "{{ .jwt_secret }}"
        JWT_ALGORITHM: "HS256"

        # AWS credentials for S3, SQS, EventBridge
        AWS_ACCESS_KEY_ID: "{{ .aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .aws_secret_access_key }}"

        # Slack webhook for alerts
        SLACK_WEBHOOK_URL: "{{ .slack_webhook_url }}"

  dataFrom:
    - extract:
        key: gympt/dev/backend-api
