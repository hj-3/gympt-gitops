---
# ExternalSecret for Generic Worker
# Syncs secrets from AWS Secrets Manager to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: generic-worker-secrets
  namespace: workers
  labels:
    app.kubernetes.io/name: generic-worker
    app.kubernetes.io/component: worker
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: generic-worker-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Redis for task queue
        REDIS_URL: "redis://:{{ .redis_password }}@{{ .redis_host }}:{{ .redis_port }}/4"
        REDIS_PASSWORD: "{{ .redis_password }}"

        # AWS credentials for SQS, S3, DynamoDB
        AWS_ACCESS_KEY_ID: "{{ .aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .aws_secret_access_key }}"

        # SQS queues
        SQS_REPORT_GENERATION_QUEUE_URL: "{{ .sqs_report_generation_queue_url }}"
        SQS_EMAIL_NOTIFICATION_QUEUE_URL: "{{ .sqs_email_notification_queue_url }}"

        # S3 buckets
        S3_REPORT_BUCKET: "{{ .s3_report_bucket }}"

        # DynamoDB tables
        DYNAMODB_REPORTS_TABLE: "{{ .dynamodb_reports_table }}"

        # Email service (SES)
        SES_FROM_EMAIL: "{{ .ses_from_email }}"

  dataFrom:
    - extract:
        key: gympt/dev/generic-worker
