---
# ExternalSecret for Posture Analysis Service
# Syncs secrets from AWS Secrets Manager to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: posture-analysis-secrets
  namespace: posture-analysis
  labels:
    app.kubernetes.io/name: posture-analysis-service
    app.kubernetes.io/component: analysis
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: posture-analysis-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Redis for real-time pub/sub
        REDIS_URL: "redis://:{{ .redis_password }}@{{ .redis_host }}:{{ .redis_port }}/2"
        REDIS_PASSWORD: "{{ .redis_password }}"

        # AWS credentials for DynamoDB and S3
        AWS_ACCESS_KEY_ID: "{{ .aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .aws_secret_access_key }}"

        # DynamoDB tables
        DYNAMODB_POSTURE_EVENTS_TABLE: "{{ .dynamodb_posture_events_table }}"
        DYNAMODB_WORKOUT_SESSIONS_TABLE: "{{ .dynamodb_workout_sessions_table }}"

        # S3 for media storage
        S3_MEDIA_BUCKET: "{{ .s3_media_bucket }}"

        # ML model configuration
        ML_MODEL_ENDPOINT: "{{ .ml_model_endpoint }}"
        ML_MODEL_API_KEY: "{{ .ml_model_api_key }}"

  dataFrom:
    - extract:
        key: gympt/dev/posture-analysis
