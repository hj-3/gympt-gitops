---
# ExternalSecret for Remediation Worker
# Syncs secrets from AWS Secrets Manager to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: remediation-worker-secrets
  namespace: workers
  labels:
    app.kubernetes.io/name: remediation-worker
    app.kubernetes.io/component: worker
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: remediation-worker-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Slack webhook for notifications
        SLACK_WEBHOOK_URL: "{{ .slack_webhook_url }}"
        SLACK_CHANNEL: "#gympt-alerts"

        # Argo CD API for rollback actions
        ARGOCD_SERVER: "argocd-server.argocd.svc.cluster.local"
        ARGOCD_TOKEN: "{{ .argocd_token }}"
        ARGOCD_INSECURE: "true"

        # Kubernetes API authentication (uses ServiceAccount by default)
        # These are optional overrides if needed
        K8S_API_SERVER: "https://kubernetes.default.svc"

        # AWS credentials for CloudWatch logs and metrics
        AWS_ACCESS_KEY_ID: "{{ .aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .aws_secret_access_key }}"

        # Redis for job queue
        REDIS_URL: "redis://:{{ .redis_password }}@{{ .redis_host }}:{{ .redis_port }}/3"
        REDIS_PASSWORD: "{{ .redis_password }}"

        # SQS for remediation tasks
        SQS_REMEDIATION_QUEUE_URL: "{{ .sqs_remediation_queue_url }}"

  dataFrom:
    - extract:
        key: gympt/dev/remediation-worker
