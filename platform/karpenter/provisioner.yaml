# NOTE: These resources are now managed by Terraform
# See: gympt-infra/terraform/modules/eks/kubernetes-addons.tf
#
# This file is kept for reference but should not be applied manually
# when using Terraform-managed infrastructure.
#
# If you need to apply these manually (non-Terraform setup):
# kubectl apply -f provisioner.yaml

apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: gympt-prod-eks-node-role  # Update for your environment
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "gympt-prod-eks"  # Update for your cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "gympt-prod-eks"  # Update for your cluster
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  tags:
    Name: gympt-prod-karpenter-node
    Environment: prod
    ManagedBy: karpenter
    Project: gympt
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.medium
            - t3.large
            - t3.xlarge
            - m5.large
            - m5.xlarge
      expireAfter: 168h
  limits:
    cpu: "100"
    memory: 200Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu
spec:
  template:
    metadata:
      labels:
        gpu: "true"
        nvidia.com/gpu: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - g4dn.xlarge
            - g4dn.2xlarge
            - g5.xlarge
            - g5.2xlarge
      expireAfter: 168h
  limits:
    cpu: "32"
    memory: 128Gi
    nvidia.com/gpu: "4"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
