# Optional: Enhanced Fluent Bit Configuration
#
# Basic Fluent Bit is installed by default via EKS add-on.
# Use this only if you need custom parsing, filtering, or multi-destination routing.
#
# Install with:
#   helm repo add aws https://aws.github.io/eks-charts
#   helm install aws-for-fluent-bit aws/aws-for-fluent-bit \
#     -n kube-system \
#     -f fluent-bit-values.yaml

# Image configuration
image:
  repository: public.ecr.aws/aws-observability/aws-for-fluent-bit
  tag: 2.31.12

# Resource allocation
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Service account with IRSA
serviceAccount:
  create: true
  name: fluent-bit
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/gympt-dev-fluent-bit

# Fluent Bit configuration
config:
  # Service configuration
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File parsers.conf
        Parsers_File custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  # Input: Collect logs from all containers
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        Refresh_Interval 10

  # Filter: Kubernetes metadata enrichment
  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Kube_URL https://kubernetes.default.svc:443
        Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix kube.var.log.containers.
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Labels On
        Annotations Off

    [FILTER]
        Name modify
        Match kube.*
        Add cluster_name ${CLUSTER_NAME}
        Add aws_region ${AWS_REGION}

    [FILTER]
        Name nest
        Match kube.*
        Operation lift
        Nested_under kubernetes
        Add_prefix k8s_

  # Output: CloudWatch Logs
  outputs: |
    [OUTPUT]
        Name cloudwatch_logs
        Match kube.*
        region ${AWS_REGION}
        log_group_name /aws/eks/${CLUSTER_NAME}
        log_stream_prefix from-fluent-bit-
        auto_create_group true
        log_retention_days 7
        log_key log

  # Custom parsers for application logs
  customParsers: |
    [PARSER]
        Name json
        Format json
        Time_Key timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep On

    [PARSER]
        Name spring_boot
        Format regex
        Regex ^(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\s+(?<level>\w+)\s+\[(?<thread>[^\]]+)\]\s+(?<logger>[^\s]+)\s+:\s+(?<message>.*)$
        Time_Key timestamp
        Time_Format %Y-%m-%d %H:%M:%S.%L

    [PARSER]
        Name python_json
        Format json
        Time_Key timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%f%z
        Time_Keep On

# DaemonSet configuration
daemonset:
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2020"
    prometheus.io/path: "/api/v1/metrics/prometheus"

  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

# Environment variables
env:
  - name: AWS_REGION
    value: ap-northeast-2
  - name: CLUSTER_NAME
    value: gympt-dev-eks

# Prometheus ServiceMonitor (optional)
serviceMonitor:
  enabled: false
  namespace: kube-system
  interval: 30s
  scrapeTimeout: 10s

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# Host path mounts for log collection
volumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
