apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-service
  namespace: agent-service
  labels:
    app: agent-service
    release: monitoring
spec:
  selector:
    matchLabels:
      app: agent-service
  namespaceSelector:
    matchNames:
    - agent-service
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
