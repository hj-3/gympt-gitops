apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: posture-analysis-service
  namespace: posture-analysis
  labels:
    app: posture-analysis-service
    release: monitoring
spec:
  selector:
    matchLabels:
      app: posture-analysis-service
  namespaceSelector:
    matchNames:
    - posture-analysis
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
