---
# Default Deny All NetworkPolicy
# Apply to each namespace to enforce zero-trust by default
# This ensures all traffic is blocked unless explicitly allowed

# Backend API namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: backend-api
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Agent Service namespace
apiVersion: networking.k8s.io/v1
