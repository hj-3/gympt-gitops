# Remediation Worker Alert-to-Action Mapping
#
# This file defines how the remediation-worker responds to specific alerts
# from Alertmanager.
#
# Structure:
#   alertName: The name of the alert from PrometheusRule
#   severity: critical, warning, info
#   action: The remediation action to take
#   params: Parameters for the action
#   dryRun: If true, log action but don't execute (override via env var)
#   notifySlack: Send Slack notification

rules:
  # Backend API Alerts
  - alertName: BackendHighErrorRate
    severity: critical
    action: restart_deployment
    params:
      namespace: backend-api
      deployment: backend-api
      gracePeriod: 30
    dryRun: false
    notifySlack: true
    cooldown: 600  # 10 minutes
    description: "Restart backend-api deployment due to high 5xx error rate"

  - alertName: BackendHighLatency
    severity: warning
    action: scale_deployment
    params:
      namespace: backend-api
      deployment: backend-api
      scaleDirection: up
      targetReplicas: "+1"  # Add 1 replica
      maxReplicas: 10
    dryRun: false
    notifySlack: true
    cooldown: 900  # 15 minutes
    description: "Scale up backend-api due to high P99 latency"

  - alertName: BackendPodRestarting
    severity: critical
    action: rollback_argocd
    params:
      application: backend-api-dev
      namespace: argocd
      revisionHistory: 1  # Rollback to previous revision
    dryRun: false
    notifySlack: true
    cooldown: 1800  # 30 minutes
    description: "Rollback backend-api via Argo CD due to pod restart loop"

  - alertName: BackendDBPoolExhaustion
    severity: critical
    action: restart_deployment
    params:
      namespace: backend-api
      deployment: backend-api
      gracePeriod: 60
    dryRun: false
    notifySlack: true
    cooldown: 600
    description: "Restart backend-api to reset DB connection pool"

  - alertName: BackendHighMemoryUsage
    severity: warning
    action: restart_deployment
    params:
      namespace: backend-api
      deployment: backend-api
      gracePeriod: 60
    dryRun: false
    notifySlack: true
    cooldown: 1800
    description: "Restart backend-api due to high JVM heap usage"

  # Agent Service Alerts
  - alertName: AgentServiceHighErrorRate
    severity: critical
    action: restart_deployment
    params:
      namespace: agent-service
      deployment: agent-service
      gracePeriod: 30
    dryRun: false
    notifySlack: true
    cooldown: 600
    description: "Restart agent-service due to high error rate"

  - alertName: AgentServicePodRestarting
    severity: critical
    action: rollback_argocd
    params:
      application: agent-service-dev
      namespace: argocd
      revisionHistory: 1
    dryRun: false
    notifySlack: true
    cooldown: 1800
    description: "Rollback agent-service via Argo CD"

  # Posture Analysis Alerts
  - alertName: PostureAnalysisPodRestarting
    severity: critical
    action: rollback_argocd
    params:
      application: posture-analysis-service-dev
      namespace: argocd
      revisionHistory: 1
    dryRun: false
    notifySlack: true
    cooldown: 1800
    description: "Rollback posture-analysis-service via Argo CD"

  # Report Service Alerts
  - alertName: ReportServiceHighErrorRate
    severity: critical
    action: restart_deployment
    params:
      namespace: report-service
      deployment: report-service
      gracePeriod: 30
    dryRun: false
    notifySlack: true
    cooldown: 600
    description: "Restart report-service due to high error rate"

  # Infrastructure Alerts - GPU
  - alertName: GPUHighUtilization
    severity: warning
    action: notify_only
    params:
      message: "GPU utilization above 95% - consider scaling GPU node group"
    dryRun: false
    notifySlack: true
    cooldown: 3600  # 1 hour
    description: "GPU utilization alert - manual intervention may be needed"

  - alertName: GPUMemoryHigh
    severity: warning
    action: notify_only
    params:
      message: "GPU memory usage above 90% - monitor for OOM errors"
    dryRun: false
    notifySlack: true
    cooldown: 3600
    description: "GPU memory alert"

  # Infrastructure Alerts - Redis
  - alertName: RedisConnectionError
    severity: critical
    action: notify_only
    params:
      message: "Redis connection error detected - check ElastiCache cluster health"
    dryRun: false
    notifySlack: true
    cooldown: 300
    description: "Redis connection failure - AWS ElastiCache issue"

  - alertName: RedisHighMemory
    severity: warning
    action: notify_only
    params:
      message: "Redis memory usage above 90% - consider increasing node size or eviction policy"
    dryRun: false
    notifySlack: true
    cooldown: 1800
    description: "Redis memory pressure"

  - alertName: RedisHighEvictionRate
    severity: warning
    action: notify_only
    params:
      message: "Redis eviction rate high - cache performance degraded"
    dryRun: false
    notifySlack: true
    cooldown: 900
    description: "Redis evicting keys rapidly"

  # Infrastructure Alerts - Bedrock
  - alertName: BedrockHighErrorRate
    severity: critical
    action: notify_only
    params:
      message: "Bedrock API error rate above threshold - check AWS service health"
    dryRun: false
    notifySlack: true
    cooldown: 600
    description: "Bedrock API errors"

  - alertName: BedrockThrottling
    severity: warning
    action: notify_only
    params:
      message: "Bedrock throttling detected - consider request rate limiting or quota increase"
    dryRun: false
    notifySlack: true
    cooldown: 900
    description: "Bedrock API throttling"

  # Infrastructure Alerts - SQS
  - alertName: SQSQueueBacklog
    severity: warning
    action: scale_deployment
    params:
      namespace: workers
      deployment: remediation-worker
      scaleDirection: up
      targetReplicas: "+2"
      maxReplicas: 10
    dryRun: false
    notifySlack: true
    cooldown: 900
    description: "Scale up workers due to SQS queue backlog"

  - alertName: SQSMessageAge
    severity: warning
    action: scale_deployment
    params:
      namespace: workers
      deployment: generic-worker
      scaleDirection: up
      targetReplicas: "+1"
      maxReplicas: 10
    dryRun: false
    notifySlack: true
    cooldown: 600
    description: "Scale up workers due to old messages in queue"

  - alertName: SQSDLQMessages
    severity: critical
    action: notify_only
    params:
      message: "Messages in DLQ detected - manual investigation required"
    dryRun: false
    notifySlack: true
    cooldown: 300
    description: "DLQ has messages - potential data processing failures"

# Action Definitions
#
# Available actions:
#
# 1. restart_deployment
#    Performs rolling restart of a deployment
#    Params: namespace, deployment, gracePeriod
#
# 2. scale_deployment
#    Scales deployment up or down
#    Params: namespace, deployment, scaleDirection (up/down), targetReplicas, maxReplicas, minReplicas
#
# 3. rollback_argocd
#    Triggers Argo CD rollback to previous revision
#    Params: application, namespace, revisionHistory
#
# 4. notify_only
#    Sends notification without taking action
#    Params: message
#
# 5. run_job
#    Executes a Kubernetes Job (e.g., DB repair script)
#    Params: namespace, jobTemplate, ttlSecondsAfterFinished
#
# 6. patch_deployment
#    Applies a JSON patch to deployment spec
#    Params: namespace, deployment, patch
