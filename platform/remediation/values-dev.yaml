# Helm values for remediation-worker (Dev environment)

replicaCount: 1

image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/gympt/remediation-worker
  pullPolicy: IfNotPresent
  tag: "dev-latest"

serviceAccount:
  create: true
  name: remediation-worker
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/gympt-dev-remediation-worker

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false

env:
  - name: ENVIRONMENT
    value: "dev"
  - name: LOG_LEVEL
    value: "INFO"
  - name: DRY_RUN
    value: "false"
  - name: SLACK_WEBHOOK_URL
    valueFrom:
      secretKeyRef:
        name: remediation-secrets
        key: slack-webhook-url
  - name: ARGOCD_SERVER
    value: "argocd-server.argocd.svc.cluster.local:443"
  - name: ARGOCD_AUTH_TOKEN
    valueFrom:
      secretKeyRef:
        name: remediation-secrets
        key: argocd-auth-token
  - name: AWS_REGION
    value: "ap-northeast-2"
  - name: EKS_CLUSTER_NAME
    value: "gympt-dev-eks"

# Prometheus metrics
metrics:
  enabled: true
  port: 8080
  path: /metrics

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# ConfigMap for alert rules
alertRules:
  # Pod restart remediation
  podRestart:
    enabled: true
    maxRestarts: 3
    timeWindow: 600  # 10 minutes
    action: "scale_down_up"
    notifySlack: true

  # High error rate remediation
  highErrorRate:
    enabled: true
    threshold: 5  # percent
    duration: 300  # 5 minutes
    action: "restart_deployment"
    notifySlack: true

  # High latency remediation
  highLatency:
    enabled: true
    threshold: 2000  # milliseconds
    duration: 600  # 10 minutes
    action: "scale_up"
    notifySlack: true

  # GPU high utilization
  gpuHighUtil:
    enabled: true
    threshold: 95  # percent
    duration: 600  # 10 minutes
    action: "notify_only"
    notifySlack: true

  # Redis connection error
  redisConnectionError:
    enabled: true
    action: "notify_only"
    notifySlack: true

  # SQS queue backlog
  sqsBacklog:
    enabled: true
    threshold: 1000
    duration: 600  # 10 minutes
    action: "scale_up_workers"
    notifySlack: true

# Remediation action limits (safety)
actionLimits:
  maxRestartsPerHour: 3
  maxScaleUpsPerHour: 5
  maxRollbacksPerHour: 2
  cooldownPeriod: 300  # 5 minutes between actions on same deployment

# Argo CD rollback configuration
argocd:
  enabled: true
  autoRollback: true
  rollbackOnFailure: true
  maxRollbackHistory: 5

# AWS CloudWatch Events
cloudwatch:
  enabled: true
  eventBridgeRole: arn:aws:iam::<AWS_ACCOUNT_ID>:role/gympt-dev-eventbridge-remediation

# Notification channels
notifications:
  slack:
    enabled: true
    channels:
      critical: "#alerts-critical"
      warning: "#alerts-warning"
      info: "#alerts-info"

  pagerduty:
    enabled: false
    integrationKey: ""

# Excluded namespaces (never auto-remediate)
excludedNamespaces:
  - kube-system
  - kube-public
  - kube-node-lease
  - argocd
  - monitoring

# Excluded deployments (never auto-remediate)
excludedDeployments:
  - kube-prometheus-stack
  - argocd-server
  - argocd-repo-server
  - remediation-worker
